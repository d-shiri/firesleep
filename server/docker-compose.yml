services:
  firesleep-bridge:
    build: .
    image: firesleep-bridge:latest
    container_name: firesleep-bridge
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      # TV_HOST is optional: leave unset and configure via the web UI at
      # http://<host>:8765/. If set, it bootstraps the value before the
      # user opens the UI (the UI's saved value, if any, takes precedence).
      TV_HOST: ${TV_HOST:-}
      LG_KEY_FILE: /data/lg_key.json
    volumes:
      - lg-key:/data
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  lg-key:
