services:
  firesleep-bridge:
    build: .
    image: firesleep-bridge:latest
    container_name: firesleep-bridge
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      # TV_HOST/TV_BRAND are optional: leave unset and configure via the
      # web UI at http://<host>:8765/. If set, they bootstrap a single TV
      # only on first run (when no TVs exist yet); ignored thereafter.
      TV_HOST: ${TV_HOST:-}
      TV_BRAND: ${TV_BRAND:-}
    volumes:
      # Volume name kept as `lg-key` for upgrade compatibility — it now
      # holds the multi-TV config and every backend's keys, not just LG.
      - lg-key:/data
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  lg-key:
