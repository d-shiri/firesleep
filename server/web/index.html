<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FireSleep</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header>
      <img class="logo" src="logo.png" alt="FireSleep" />
      <p class="sub">Bridge admin</p>
    </header>

    <section class="card">
      <h2>Settings</h2>
      <p class="muted">Bridge-wide options. Saved to <code>/data/config.json</code>.</p>
      <div class="row">
        <label>
          <span class="label">Log level</span>
          <select id="log-level">
            <option value="DEBUG">DEBUG</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
          </select>
        </label>
      </div>
      <div class="actions">
        <button id="save-config" class="primary">Save</button>
        <span id="config-status" class="status"></span>
      </div>
    </section>

    <h2 class="section-title">TVs</h2>
    <p class="muted section-sub">
      Each TV is paired and powered off independently. <code>POST /poweroff</code>
      fans out to all of them — the Fire TV APK doesn't need to know about
      individual TVs.
    </p>
    <div id="tv-list"></div>

    <section class="card add-tv">
      <h2>Add a TV</h2>
      <div class="row">
        <label>
          <span class="label">Name</span>
          <input id="new-name" type="text" placeholder="e.g. Living room" />
        </label>
      </div>
      <div class="row">
        <label>
          <span class="label">Backend</span>
          <select id="new-brand">
            <option value="lg">LG webOS (direct)</option>
            <option value="firetv">Fire TV → CEC (Samsung / Sony / Vizio / Hisense / …)</option>
          </select>
        </label>
      </div>
      <div class="row">
        <label>
          <span class="label">Host</span>
          <input id="new-host" type="text" placeholder="hostname or IP" />
        </label>
      </div>
      <p class="muted" id="new-help"></p>
      <div class="actions">
        <button id="add-tv" class="primary">Add TV</button>
        <span id="add-status" class="status"></span>
      </div>
    </section>

    <footer>
      <span class="muted">FireSleep bridge · port 8765</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
